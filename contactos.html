<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto — Grafito</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f9f8f6;
            font-family: 'Arial', sans-serif;
            color: #1a1a1a;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            padding: 32px 8%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(26, 58, 143, 0.15);
        }

        .logo {
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #1a1a1a;
            text-decoration: none;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555;
            transition: color 0.2s;
        }

        .back-btn:hover { color: #1a3a8f; }

        .back-btn .arrow {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-left: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            transform: rotate(45deg);
        }

        /* ── Layout principal ── */
        main {
            padding: 64px 8% 80px;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 80px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ── Columna izquierda ── */
        .contact-left h1 {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: clamp(36px, 4.5vw, 60px);
            font-weight: 700;
            color: #1a3a8f;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .contact-left h1 em { font-style: italic; }

        .contact-left p {
            font-size: 14px;
            color: #666;
            line-height: 1.7;
            max-width: 340px;
        }

        /* ── Columna derecha ── */
        .contact-right {
            padding-top: 8px;
        }

        .contact-divider {
            width: 100%;
            height: 2px;
            background: #1a3a8f;
            margin-bottom: 40px;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0,0,0,0.07);
            text-decoration: none;
            color: inherit;
            transition: padding-left 0.2s ease;
        }

        .contact-item:hover {
            padding-left: 6px;
        }

        .contact-item:hover .contact-icon-wrap {
            background: #1a3a8f;
            color: #fff;
        }

        .contact-icon-wrap {
            width: 44px;
            height: 44px;
            border: 1.5px solid rgba(26, 58, 143, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, color 0.2s;
        }

        .contact-icon-wrap svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .contact-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #1a3a8f;
            margin-bottom: 3px;
        }

        .contact-value {
            font-family: Georgia, serif;
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
        }

        footer {
            padding: 48px 8%;
            display: flex;
            justify-content: center;
            border-top: 1px solid rgba(26, 58, 143, 0.15);
        }

        .footer-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #555;
            padding: 14px 36px;
            border: 1px solid rgba(26, 58, 143, 0.3);
            transition: all 0.25s ease;
        }

        .footer-home-btn:hover {
            color: #fff;
            background: #1a3a8f;
            border-color: #1a3a8f;
        }

        .footer-home-btn:hover .footer-arrow {
            border-color: #fff;
        }

        .footer-arrow {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-left: 2px solid #555;
            border-bottom: 2px solid #555;
            transform: rotate(45deg);
            transition: border-color 0.25s ease;
        }

        /* ── Tablet (≤ 900px) ── */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                gap: 40px;
                padding: 48px 8% 60px;
            }

            .contact-left p { max-width: 100%; }

            footer { padding: 40px 8%; }
        }

        /* ── Mobile (≤ 600px) ── */
        @media (max-width: 600px) {
            header { padding: 18px 5%; }

            .logo {
                font-size: 18px;
                letter-spacing: 3px;
            }

            main {
                padding: 36px 5% 48px;
                gap: 28px;
            }

            .contact-item { gap: 14px; }

            .contact-value { font-size: 14px; }

            footer { padding: 32px 5%; }

            .footer-home-btn {
                padding: 12px 22px;
                font-size: 11px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
